<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GuardForce | Password Strength Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="container">
    <div class="header">
      <h2>ShieldCheck</h2>
      <p class="subtitle">Secure your digital identity with strong passwords.</p>
    </div>

    <div class="input-group">
      <input type="text" id="username" placeholder="Enter username..." spellcheck="false" autocomplete="off" />
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Enter your password..." spellcheck="false" autocomplete="off" />
      <div id="toggle-password" title="Toggle Visibility">👁️</div>
      <div id="copy-password" title="Copy to Clipboard"><i class="fa-solid fa-copy"></i></div>
    </div>

    <div class="actions">
      <button id="generate-btn" class="btn-secondary">
        <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Strong Password
      </button>
    </div>

    <div id="breach-status" class="breach-status hidden">
      <i class="fa-solid fa-shield-virus"></i>
      <span id="breach-text">Checking for data breaches...</span>
    </div>

    <div class="strength-meter">
      <div class="progress-bg">
        <div id="strength-bar"></div>
      </div>
      <div id="strength-text">
        <span>Security Level</span>
        <span id="strength-label">Waiting...</span>
      </div>
    </div>

    <ul class="requirements-list" id="requirements">
      <li id="length"><i><i class="fa-solid fa-circle-dot"></i></i> 8+ Characters</li>
      <li id="uppercase"><i><i class="fa-solid fa-circle-dot"></i></i> Uppercase Letter</li>
      <li id="number"><i><i class="fa-solid fa-circle-dot"></i></i> Numerical Digit</li>
      <li id="special"><i><i class="fa-solid fa-circle-dot"></i></i> Special Character</li>
      <li id="not-common"><i><i class="fa-solid fa-circle-dot"></i></i> Unique Patterns</li>
    </ul>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
